name: teacher_ai
description: "AI Teacher Assistant built with Flutter"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  flutter_riverpod: ^2.4.9
  file_picker: ^6.1.1
  flutter_markdown: ^0.6.18+3
  path_provider: ^2.1.2
  gap: ^3.0.1
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.3
  pdf: ^3.11.0
  printing: ^5.13.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
